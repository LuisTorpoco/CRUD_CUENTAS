select.accounts.by.status = gmcwn; SELECT a.id, a.account_number, a.card_number, a.balance, a.nip, a.first_name, a.last_name, a.age, a.curp, a.rfc, a.client_type, a.status from GMCWN.T_GMCWN_ACCOUNTS a where status = :status;

select.account.by.number = gmcwn; SELECT a.id, a.account_number, a.card_number, a.balance, a.nip, a.first_name, a.last_name, a.age, a.curp, a.rfc, a.client_type, a.status from GMCWN.T_GMCWN_ACCOUNTS a where a.account_number = :accountNumber;

select.account.by.card = gmcwn; SELECT a.id, a.account_number, a.card_number, a.balance, a.nip, a.first_name, a.last_name, a.age, a.curp, a.rfc, a.client_type, a.status from GMCWN.T_GMCWN_ACCOUNTS a where a.card_number = :cardNumber;

insert.account = gmcwn; INSERT INTO GMCWN.T_GMCWN_ACCOUNTS (account_number, card_number, balance, nip, first_name, last_name, age, curp, rfc, client_type, status) VALUES (:accountNumber, :cardNumber, :balance, :nip, :firstName, :lastName, :age, :curp, :rfc, :clientType, 1);

update.account = gmcwn; UPDATE GMCWN.T_GMCWN_ACCOUNTS SET balance = :balance, card_number = :cardNumber, nip = :nip, first_name = :firstName, last_name = :lastName, age = :age, curp = :curp, rfc = :rfc WHERE account_number = :accountNumber;

update.account.status = gmcwn; UPDATE GMCWN.T_GMCWN_ACCOUNTS SET status = :status WHERE account_number = :accountNumber;